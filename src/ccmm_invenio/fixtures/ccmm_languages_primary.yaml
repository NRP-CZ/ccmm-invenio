      the Classical Arabic language of the 6th century. This includes both the literary
      language and varieties of Arabic spoken in a wide arc of territory, stretching
      across the Middle East, North Africa, the Horn of Africa. Arabic belongs to
      the Semitic branch of the Afro-Asiatic family. The literary language is called
      Modern Standard Arabic or Literary Arabic, which is a pluricentric, fusional
